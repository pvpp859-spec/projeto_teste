{% extends "base.html" %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-header bg-white py-3 text-center">
                    <h4 class="mb-0 text-secondary">
                        {% if categoria %}
                            Editar Categoria
                        {% else %}
                            Nova Categoria
                        {% endif %}
                    </h4>                
                </div>

                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                Nome da Categoria
                            </label>
                            <input type="text" name="nome_categoria" class="form-control" value="{{ categoria.nome if categoria else ''}}" required placeholder="Ex: Informática">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('web.listar_categorias_view') }}" class="btn btn-outline-secondary">
                                Voltar
                            <a>
                            <button type="submit" class="btn btn-success px-4 shadow-sm">
                                Salvar Categoria
                            </button>
                        </div>
                    </form>
                
                </div>
            </div>
        </div>
    
    </div>
{% endblock  %}
