{% extends 'base.html' %}

{% block content %}

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 text-secondary mb-0">
            <i class="bi bi-people"></i> Gerenciamento de Usuários
        </h2>
        
        <a href="{{ url_for('web.novo_usuario_view') }}" class="btn btn-primary shadow-sm">
            <i class="bi bi-person-plus"></i> Novo Usuário
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-0">
            <div class="table-responsive"> <table class="table table-hover table-striped mb-0 text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>NOME</th>
                            <th>E-MAIL</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for usuario in usuarios %}
                        <tr>
                            <td>{{ usuario.id }}</td>
                            <td>{{ usuario.nome }}</td>
                            <td>{{ usuario.email }}</td>
                            <td>
                                <a href="#" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <button class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-muted py-4">Nenhum usuário cadastrado.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

{% endblock %}
